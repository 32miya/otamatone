<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>ぷよトーン</title>
<style>
* {
  box-sizing: border-box;
  user-select: none;
  -webkit-user-select: none;
  -webkit-touch-callout: none;
  -webkit-tap-highlight-color: transparent;
}
html, body {
  margin: 0; padding: 0;
  width: 100%; height: 100%;
  background: #0d0d1a;
  overflow: hidden;
  touch-action: none;
  font-family: 'Helvetica Neue', sans-serif;
}

/* ===== スタート画面 ===== */
#start-overlay {
  position: fixed;
  inset: 0;
  background: linear-gradient(135deg, #0d0d1a 0%, #1a0033 100%);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  z-index: 999;
  gap: 16px;
}
#start-overlay h1 {
  color: #fff;
  font-size: clamp(22px, 5vw, 36px);
  margin: 0;
  letter-spacing: 2px;
}
#start-overlay p {
  color: #aaa;
  font-size: 14px;
  margin: 0;
  text-align: center;
  line-height: 1.8;
}
#start-btn {
  margin-top: 12px;
  padding: 16px 48px;
  font-size: 18px;
  font-weight: bold;
  color: #fff;
  background: linear-gradient(135deg, #ff3366, #ff6b35);
  border: none;
  border-radius: 50px;
  box-shadow: 0 6px 24px rgba(255,51,102,0.5);
  cursor: pointer;
  transition: transform 0.1s, box-shadow 0.1s;
}
#start-btn:active {
  transform: scale(0.95);
  box-shadow: 0 2px 10px rgba(255,51,102,0.3);
}
.preview-char {
  font-size: 64px;
  animation: float 2s ease-in-out infinite;
}
@keyframes float {
  0%,100% { transform: translateY(0); }
  50%      { transform: translateY(-12px); }
}

/* ===== メインレイアウト ===== */
#app {
  display: flex;
  flex-direction: row-reverse;
  width: 100%;
  height: 100%;
  padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
}

/* ===== 左：シッポ ===== */
#stem-section {
  flex: 0 0 42%;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 12px 8px;
  gap: 8px;
}
#stem-section .label {
  color: #88aaff;
  font-size: 11px;
  letter-spacing: 1px;
  text-transform: uppercase;
  font-weight: bold;
}

#stem-wrap {
  position: relative;
  width: 64px;
  flex: 1;
  max-height: 88%;
}

#stem-track {
  position: absolute;
  inset: 0;
  background: linear-gradient(to bottom,
    #6633ff 0%, #3366ff 20%, #0099ff 40%,
    #00cc66 55%, #ffcc00 70%, #ff6600 85%, #ff0033 100%);
  border-radius: 32px;
  border: 3px solid rgba(255,255,255,0.25);
  box-shadow: 0 0 20px rgba(100,100,255,0.3), inset 0 0 12px rgba(0,0,0,0.4);
  cursor: pointer;
}

/* 音名ラベル */
.note-label {
  position: absolute;
  left: calc(100% + 8px);
  transform: translateY(-50%);
  color: rgba(255,255,255,0.6);
  font-size: 10px;
  font-weight: bold;
  pointer-events: none;
  white-space: nowrap;
}
.note-label::after {
  content: '';
  position: absolute;
  right: calc(100% + 4px);
  top: 50%;
  width: 8px;
  height: 1px;
  background: rgba(255,255,255,0.3);
}

/* 指示ドット */
#stem-dot {
  position: absolute;
  left: 50%;
  top: 50%;
  transform: translate(-50%, -50%);
  width: 28px;
  height: 28px;
  background: radial-gradient(circle, #fff 30%, rgba(255,255,255,0.4));
  border-radius: 50%;
  box-shadow: 0 0 12px rgba(255,255,255,0.8), 0 0 30px rgba(255,255,255,0.4);
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.1s;
}

.hint-text {
  color: #556;
  font-size: 10px;
  text-align: center;
  line-height: 1.5;
}

/* ===== 右：フェイス ===== */
#face-section {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 20px;
  padding: 12px;
}

/* ぷよトーン本体SVG */
#puyo-svg {
  width: min(55vw, 200px);
  height: auto;
  filter: drop-shadow(0 8px 24px rgba(0,0,0,0.5));
  transition: transform 0.08s ease;
}

/* 音名表示 */
#note-display {
  color: #fff;
  font-size: 28px;
  font-weight: bold;
  letter-spacing: 4px;
  text-shadow: 0 0 20px rgba(100,200,255,0.8);
  min-height: 38px;
  transition: opacity 0.2s;
  opacity: 0;
}
#note-display.active { opacity: 1; }

/* ワウボタン */
#wah-btn {
  width: min(52vw, 180px);
  padding: 16px 0;
  background: linear-gradient(135deg, #ff3366, #cc1144);
  color: white;
  font-weight: bold;
  font-size: 15px;
  border-radius: 50px;
  text-align: center;
  box-shadow: 0 6px 0 #880022, 0 8px 20px rgba(255,51,102,0.4);
  transition: transform 0.05s, box-shadow 0.05s;
  cursor: pointer;
}
#wah-btn.pressed {
  transform: translateY(4px);
  box-shadow: 0 2px 0 #880022, 0 4px 10px rgba(255,51,102,0.3);
}

/* ===== 音量バー（右端） ===== */
#vol-bar-wrap {
  position: fixed;
  right: 8px;
  top: 50%;
  transform: translateY(-50%);
  width: 8px;
  height: 120px;
  background: rgba(255,255,255,0.1);
  border-radius: 4px;
  overflow: hidden;
}
#vol-bar {
  position: absolute;
  bottom: 0;
  width: 100%;
  height: 0%;
  background: linear-gradient(to top, #ff3366, #ffcc00, #00ff88);
  border-radius: 4px;
  transition: height 0.05s;
}

/* ===== Vibrato インジケーター ===== */
#vibrato-indicator {
  position: fixed;
  bottom: 16px;
  left: 50%;
  transform: translateX(-50%);
  color: rgba(255,200,100,0.8);
  font-size: 11px;
  letter-spacing: 2px;
  opacity: 0;
  transition: opacity 0.3s;
  pointer-events: none;
}
#vibrato-indicator.active { opacity: 1; }
</style>
</head>
<body>

<!-- スタート画面 -->
<div id="start-overlay">
  <div class="preview-char">🐱</div>
  <h1>ぷよトーン</h1>
  <p>
    左：しっぽをなぞって音程<br>
    右ボタン長押し：にゃんわう！<br>
    細かく震わすとビブラート✨
  </p>
  <button id="start-btn">▶ 演奏を始める</button>
</div>

<!-- メイン画面 -->
<div id="app">

  <!-- 左：シッポスイッチ -->
  <div id="stem-section">
    <div class="label">シッポ</div>
    <div id="stem-wrap">
      <div id="stem-track"></div>
      <div id="stem-dot"></div>
    </div>
    <div class="hint-text">細かく震わすと<br>ビブラート ✨</div>
  </div>

  <!-- 右：顔＆ワウ -->
  <div id="face-section">
    <!-- ぷよトーン ネコSVGキャラ -->
    <svg id="puyo-svg" viewBox="0 0 200 240" xmlns="http://www.w3.org/2000/svg">
      <!-- ネコ耳（左） -->
      <polygon points="36,72 58,18 80,68" fill="#ffb3d1" stroke="#e080aa" stroke-width="2"/>
      <polygon points="46,66 60,32 74,64" fill="#ff88bb"/>
      <!-- ネコ耳（右） -->
      <polygon points="120,68 142,18 164,72" fill="#ffb3d1" stroke="#e080aa" stroke-width="2"/>
      <polygon points="126,64 140,32 154,66" fill="#ff88bb"/>
      <!-- ボディ（ぷよっと丸い） -->
      <ellipse cx="100" cy="125" rx="82" ry="80" fill="#fff5f8" stroke="#f0b8cc" stroke-width="3"/>
      <!-- 頬 -->
      <ellipse cx="58" cy="138" rx="17" ry="11" fill="rgba(255,100,150,0.22)"/>
      <ellipse cx="142" cy="138" rx="17" ry="11" fill="rgba(255,100,150,0.22)"/>
      <!-- 左目（大きくつぶらな目） -->
      <ellipse cx="76" cy="110" rx="15" ry="18" fill="#1a1a2e"/>
      <ellipse cx="76" cy="110" rx="10" ry="13" fill="#2233aa"/>
      <circle cx="81" cy="103" r="5.5" fill="#fff"/>
      <circle cx="71" cy="117" r="2" fill="rgba(255,255,255,0.4)"/>
      <!-- 右目 -->
      <ellipse cx="124" cy="110" rx="15" ry="18" fill="#1a1a2e"/>
      <ellipse cx="124" cy="110" rx="10" ry="13" fill="#2233aa"/>
      <circle cx="129" cy="103" r="5.5" fill="#fff"/>
      <circle cx="119" cy="117" r="2" fill="rgba(255,255,255,0.4)"/>
      <!-- 鼻 -->
      <polygon points="100,131 96,137 104,137" fill="#ff7799"/>
      <!-- ひげ（左） -->
      <line x1="30" y1="135" x2="88" y2="139" stroke="rgba(180,180,200,0.7)" stroke-width="1.5"/>
      <line x1="28" y1="143" x2="88" y2="143" stroke="rgba(180,180,200,0.7)" stroke-width="1.5"/>
      <line x1="32" y1="151" x2="88" y2="147" stroke="rgba(180,180,200,0.7)" stroke-width="1.5"/>
      <!-- ひげ（右） -->
      <line x1="170" y1="135" x2="112" y2="139" stroke="rgba(180,180,200,0.7)" stroke-width="1.5"/>
      <line x1="172" y1="143" x2="112" y2="143" stroke="rgba(180,180,200,0.7)" stroke-width="1.5"/>
      <line x1="168" y1="151" x2="112" y2="147" stroke="rgba(180,180,200,0.7)" stroke-width="1.5"/>
      <!-- 口（動的に変化） -->
      <g id="mouth-group">
        <!-- 閉じた口（ω型） -->
        <path id="mouth-closed" d="M90 144 Q95 150 100 147 Q105 150 110 144" fill="none" stroke="#cc5577" stroke-width="2.5" stroke-linecap="round"/>
        <!-- 開いた口 -->
        <ellipse id="mouth-open" cx="100" cy="150" rx="20" ry="14" fill="#cc2244" stroke="#aa1133" stroke-width="2" opacity="0"/>
        <!-- 歯 -->
        <rect id="mouth-teeth" x="87" y="142" width="26" height="9" rx="4" fill="white" opacity="0"/>
      </g>
      <!-- しっぽ（ネコ風にくるっと） -->
      <path d="M84 197 Q72 218 56 228 Q76 220 100 232 Q124 220 144 228 Q128 218 116 197 Z" fill="#fff5f8" stroke="#f0b8cc" stroke-width="2"/>
    </svg>

    <!-- 現在の音名 -->
    <div id="note-display">--</div>

    <!-- にゃんわうボタン -->
    <div id="wah-btn">🐱 にゃんわう！</div>
  </div>
</div>

<!-- 音量バー -->
<div id="vol-bar-wrap">
  <div id="vol-bar"></div>
</div>

<!-- Vibrato インジケーター -->
<div id="vibrato-indicator">〜 ビブラート 〜</div>
